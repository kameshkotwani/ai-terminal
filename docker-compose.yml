services:
  ai-terminal:
    build: .
    image: ai-terminal:latest
    container_name: ai-terminal
    stdin_open: true
    tty: true
    environment:
      TERM: xterm-256color
      COLORTERM: truecolor
    volumes:
      - ./workspace:/workspace
      - ./.claude:/home/ubuntu/.claude
      - ./.codex:/home/ubuntu/.codex
      - ./.gemini:/home/ubuntu/.gemini
    working_dir: /workspace
